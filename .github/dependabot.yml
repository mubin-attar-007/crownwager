version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      backend:
        patterns: ["*"]
  - package-ecosystem: "pip"
    directory: "/ai"
    schedule:
      interval: "weekly"
    groups:
      ai:
        patterns: ["*"]
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      frontend:
        patterns: ["*"]
    ignore:
      # Tailwind v4 is a breaking change (PostCSS plugin moved to @tailwindcss/postcss);
      # migrate deliberately rather than letting a grouped bump pull it in and break the build.
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
