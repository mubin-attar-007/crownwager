version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      backend:
        patterns: ["*"]
  - package-ecosystem: "pip"
    directory: "/ai"
    schedule:
      interval: "weekly"
    groups:
      ai:
        patterns: ["*"]
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      frontend:
        patterns: ["*"]
        # Group only minor + patch. Breaking MAJORS (Tailwind v4, ESLint 9, etc.) come as
        # separate individual PRs to migrate deliberately, so they never block the grouped bump.
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
