name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Security scan (bandit)
        run: bandit -q -r . -x ./*/migrations,./*/tests.py || true
      - name: Tests
        run: pytest -q
        env:
          DJANGO_SETTINGS_MODULE: config_project.settings.dev

  ai:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r ai/requirements.txt
      - name: Tests
        run: pytest ai/tests -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-audit --no-fund
      - name: Unit tests
        run: npm test
      - name: Production build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
