# Dataset manifest — documents the data the model was trained on.
# The legacy archive was removed after extraction; the two files needed to retrain are preserved
# under ai/data/training/ (gitignored — they're data, not source). Raw/large data is never committed.

datasets:
  - name: nba_game_dataset
    file: ai/data/training/dataset.sqlite        # table: dataset_2012-24_new (15,115 games, 115 cols)
    origin: stats.nba.com team stats, assembled by the legacy pipeline
    label: Home-Team-Win
    used_by: ai/train/train_nba_ml.py
    reproducible: partial
    notes: >
      Per-game pre-game team season stats for both teams. This is the training matrix for the
      validated XGBoost moneyline model (see ai/models/model_manifest.yaml). Sourced originally from
      the NBA stats API (not version-pinned), so the exact set can't be perfectly re-derived; the
      snapshot here is what the shipped model was trained + validated on.

  - name: historical_odds
    file: ai/data/training/OddsData.sqlite        # per-season tables: Date, Home, Away, ML_Home, ML_Away, Win_Margin…
    origin: sportsbookreview historical odds
    reproducible: false
    notes: >
      Historical moneyline/spread/total odds + outcomes. Kept for a future ROI backtest of model
      picks against closing lines (not yet wired into serving).
