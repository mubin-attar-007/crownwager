# Dataset manifest — documents the inputs the models were/should be trained on.
# Raw data is NOT committed to git (see .gitignore). The legacy SQLite datasets are archived under
# _archived/legacy_oddsaway/nba_betting/Data/ for reference and can be registered here.

datasets:
  - name: nba_team_game_stats
    source: stats.nba.com (leaguedashteamstats)
    legacy_artifact: _archived/legacy_oddsaway/nba_betting/Data/TeamData.sqlite
    reproducible: false
    notes: >
      Per-team season stats used for feature engineering. Sourced live from the NBA stats API in the
      legacy pipeline; not version-pinned, so the exact training set cannot be reproduced. Re-collect
      and snapshot before retraining.

  - name: historical_odds
    source: sbrodds / sportsbookreview
    legacy_artifact: _archived/legacy_oddsaway/nba_betting/Data/OddsData.sqlite
    reproducible: false

  - name: nba_2024_schedule
    source: fixturedownload.com
    legacy_artifact: _archived/legacy_oddsaway/nba_betting/Data/nba-2024-UTC.csv
    reproducible: true
    notes: Static CSV of the 2024 schedule, used for days-rest features.
