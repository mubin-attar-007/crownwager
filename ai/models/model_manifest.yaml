# Model registry manifest — provenance + honestly-validated metrics.
# The service loads the model below via ai/service/model_registry.py and serves it for NBA moneyline
# predictions (falling back to the transparent baseline for unknown teams/sports).
#
# Trained + validated by: ai/train/train_nba_ml.py on ai/data/training/dataset.sqlite
# (table dataset_2012-24_new, 15,115 games).
# Unlike the legacy pipeline (which cherry-picked the best of 300 random splits), these numbers come
# from a single fixed hold-out split + 5-fold stratified cross-validation, so they are the real
# expected performance.

models:
  - name: xgboost_nba_ml
    version: "1"
    market: moneyline
    file: xgboost_nba_ml.json
    features: xgboost_nba_ml.features.json
    team_features: team_features.json
    validated: true
    sha256: "6576de5fac8a2114f08e577c459e6161cb2ce0d81ee5fa7611ccbd0308889111"
    notes: >
      XGBoost (max_depth=3, lr=0.01, 750 trees) predicting whether the home team wins, from
      pre-game team season stats (106 features). Honest 5-fold CV accuracy 65.2% ± 0.8% vs a
      57.5% home-win base rate — a genuine ~7.5-point edge.
    metrics:
      holdout_accuracy: 0.643
      cv_accuracy_mean: 0.652
      cv_accuracy_std: 0.008
      roc_auc: 0.685
      log_loss: 0.628
      home_win_base_rate: 0.575
      n_games: 15115
      n_features: 106

  - name: baseline
    version: v0
    validated: false
    notes: >
      Transparent fallback heuristic (home-court + optional ratings + rest), used for teams/sports
      not covered by the trained model.
    metrics: {}
